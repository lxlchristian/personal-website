<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/" />
  <title>Christian Liu - Composer</title>
  <meta name="description" content="Christian Liu is a composer specializing in melody-forward orchestral and electronic scores. Trained in game scoring and musical theatre writing." />
  <meta property="og:title" content="Christian Liu - Music" />
  <meta property="og:description" content="Melody-forward orchestral and electronic scores for games and theatre." />
  <meta property="og:type" content="website" />

  <!-- Fonts: Bodoni Moda (display) · Satoshi (UI/body) · Noto Sans for CJK -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />

  <!-- Homepage background images: preload so browser starts fetching during HTML parse,
       before JS creates the <img> tags. Media queries mirror the mobile/desktop split in home.js. -->
  <link rel="preload" as="image" href="/home_bg1m.jpeg" media="(max-width: 768px)">
  <link rel="preload" as="image" href="/home_bg2m.jpeg" media="(max-width: 768px)">
  <link rel="preload" as="image" href="/home_bg3m.jpeg" media="(max-width: 768px)">
  <link rel="preload" as="image" href="/home_bg4m.jpeg" media="(max-width: 768px)">
  <link rel="preload" as="image" href="/home_bg1.jpeg" media="(min-width: 769px)">
  <link rel="preload" as="image" href="/home_bg2.jpeg" media="(min-width: 769px)">
  <link rel="preload" as="image" href="/home_bg3.jpeg" media="(min-width: 769px)">
  <link rel="preload" as="image" href="/home_bg4.jpeg" media="(min-width: 769px)">

  <!-- GSAP · loaded early, guarded with typeof gsap check at use sites -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js" defer></script>

  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="audio-player.css" />
</head>
<body>
  <div id="app">
    <nav id="site-nav" aria-label="Main navigation"></nav>
    <main id="content" aria-live="polite"></main>
  </div>

  <!--
    Load order matters — each file depends on those above it:
    1. config.js          → site content (SITE_CONFIG)
    2. i18n.js            → translations (t, tTrack, applyLanguage, getCurrentLang)
    3. audio-player.js    → global AudioPlayer controller + buildTrackRow()
    4. nav.js             → nav renderer (Nav) — reads from i18n, links to Router lazily
    5. pages/*.js         → page renderers (HomePage, GamesPage, …)
    6. router.js          → SPA router (Router) — starts the app, must be last
  -->
  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="audio-player.js"></script>
  <script src="nav.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/games.js"></script>
  <script src="pages/games-island-of-hearts.js"></script>
  <script src="pages/games-realm-of-taiwu.js"></script>
  <script src="pages/musicals.js"></script>
  <script src="pages/musicals-salooney-tunes.js"></script>
  <script src="pages/musicals-city-of-peace.js"></script>
  <script src="pages/musicals-post-mortem.js"></script>
  <script src="pages/biography.js"></script>
  <script src="pages/contact.js"></script>
  <script src="router.js"></script>
</body>
</html>
